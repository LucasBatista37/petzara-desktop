<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petzara — Sem conexão</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #faf7f4;
      color: #3d2b1f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 3rem 3.5rem;
      text-align: center;
      max-width: 440px;
      width: 100%;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.25rem;
      display: block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #2d1f15;
    }

    p {
      font-size: 0.95rem;
      color: #7a5c4a;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    button {
      background: #c0664a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #a8553b; }
    button:active { background: #914929; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sem conexão com a internet</h1>
    <p>
      O Petzara não conseguiu se conectar ao servidor.<br />
      Verifique sua conexão e tente novamente.
    </p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
